<!DOCTYPE html>
<html>
<head>
    <title>SDD Price Predictor</title>
    <style>
        body { 
            font-family: Arial; 
            max-width: 600px; 
            margin: 50px auto; 
            padding: 20px; 
            background: #1a1a2e; 
            color: #eee; 
        }
        h1 { color: #ffd700; }
        input { 
            width: 100%; 
            padding: 10px; 
            margin: 8px 0; 
            background: #16213e; 
            color: #eee; 
            border: 1px solid #ffd700; 
            border-radius: 5px;
            box-sizing: border-box;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #ffd700; 
            color: #1a1a2e; 
            font-weight: bold; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px;
            margin-top: 8px;
        }
        #autofill-btn {
            background: #16213e; 
            color: #ffd700; 
            border: 1px solid #ffd700;
        }
        #result { 
            margin-top: 20px; 
            padding: 20px; 
            background: #16213e; 
            border-radius: 10px; 
            display: none; 
        }
        .post { color: #00ff88; font-size: 24px; font-weight: bold; }
        .wait { color: #ff4444; font-size: 24px; font-weight: bold; }
        label { font-size: 12px; color: #aaa; margin-left: 4px; }
        .stat { color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <h1>⚔️ SDD Price Predictor</h1>
    <p>Thunderstrike Horde — Savory Deviate Delight</p>

    <button id="autofill-btn" onclick="autofill()">⚡ Auto-fill from Thunderstrike</button>

    <label>Current listed price (copper)</label>
    <input type="number" id="price" placeholder="e.g. 7159">

    <button onclick="predict()">Should I post?</button>

    <div id="result">
        <p>Current price: <span id="current"></span>s</p>
        <p>Predicted fair value: <span id="predicted"></span>s</p>
        <p>Difference: <span id="diff"></span>s</p>
        <p class="stat">Price trend (last 6h): <span id="trend"></span></p>
        <p class="stat">Volatility: <span id="volatility"></span>s</p>
        <p class="" id="recommendation"></p>
    </div>

    <script>
        async function autofill() {
            try {
                const response = await fetch('/fetch-latest')
                const latest = await response.json()
                document.getElementById('price').value = latest.price
            } catch(e) {
                alert('Could not fetch from Thunderstrike')
                console.error(e)
            }
        }

        async function predict() {
            const price = +document.getElementById('price').value
            
            if (!price) {
                alert('Please enter a price or use Auto-fill first')
                return
            }

            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ price: price })
            })
            
            const result = await response.json()

            if (result.error) {
                alert('Error: ' + result.error)
                return
            }
            
            document.getElementById('current').textContent = result.current_price
            document.getElementById('predicted').textContent = result.predicted_price
            document.getElementById('diff').textContent = result.difference
            document.getElementById('trend').textContent = result.price_trend
            document.getElementById('volatility').textContent = result.volatility
            
            const rec = document.getElementById('recommendation')
            rec.textContent = result.recommendation
            rec.className = result.recommendation.includes('POST') ? 'post' : 'wait'
            
            document.getElementById('result').style.display = 'block'
        }
    </script>
</body>
</html>
